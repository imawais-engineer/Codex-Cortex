name: Auto Merge Codex PRs

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - labeled

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    if: contains(github.event.pull_request.labels.*.name, 'codex')

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Merge Codex PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --merge \
            --delete-branch
