name: Auto Merge Codex PRs

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - labeled
      - synchronize

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    if: contains(github.event.pull_request.labels.*.name, 'codex')

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch branches
        run: |
          git fetch origin main
          git fetch origin "${{ github.event.pull_request.head.ref }}"

      - name: Merge PR into main (prefer incoming PR changes)
        run: |
          git checkout main
          git reset --hard origin/main

          git merge \
            --no-edit \
            -X theirs \
            "origin/${{ github.event.pull_request.head.ref }}"

      - name: Push merged main
        run: |
          git push origin main

      - name: Close PR and delete branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr close "${{ github.event.pull_request.number }}" \
            --comment "Automatically merged into main (incoming Codex changes preferred)." \
            --delete-branch
